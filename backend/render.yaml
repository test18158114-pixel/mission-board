services:
  - type: web
    name: mission-board-backend
    env: docker
    plan: free
    buildCommand: "" # Handled by Dockerfile build stage
    startCommand: "" # Handled by Dockerfile CMD
    envVars:
      - key: PORT
        value: 5000
      - key: NODE_ENV
        value: production
      - key: MONGO_URI
        value: "" # Overwrite this in the Render dashboard
      - key: REDIS_URI
        value: "" # Set for horizontal scale WebSockets
      - key: CORS_ORIGIN
        value: "*" # Change this to Vercel URL in production
